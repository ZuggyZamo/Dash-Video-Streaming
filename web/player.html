<!DOCTYPE html>
<html>
<head>
    <title>DASH Streaming Test</title>
    <script src="dash.all.min.js"></script>
</head>
<body>

<h2>DASH Adaptive Streaming Test</h2>

<button onclick="loadVideo('pexels.mpd')">Play Pexels Video</button>
<button onclick="loadVideo('videezy.mpd')">Play Videezy Video</button>

<br><br>

<video id="videoPlayer" controls width="800"></video>

<script>
var player = dashjs.MediaPlayer().create();

function loadVideo(video){
    var url = "http://192.168.56.2/" + video;
    player.initialize(document.querySelector("#videoPlayer"), url, true);
}
</script>

</body>
</html>
